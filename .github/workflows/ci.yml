name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Check formatting
        run: zig fmt --check build.zig src test
      - name: Build
        run: zig build
      - name: Test
        run: zig build test --summary all
      - name: Bench binary builds
        run: zig build bench
