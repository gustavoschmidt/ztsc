<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" width="940" height="430" role="img" aria-label="Two-panel grouped bar chart across seven real packages at the default four checkers. Left panel, peak resident memory: ztsc uses 6 to 22 megabytes, tsgo 44 to 280 megabytes. Right panel, wall clock: ztsc takes 0.00 to 0.02 seconds, tsgo 0.01 to 0.23 seconds.">
